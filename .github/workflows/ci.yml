name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov coverage

    - name: Run tests
      run: |
        python test_autoclicker.py

    - name: Run with pytest
      run: |
        pytest --tb=short --cov=autoclicker --cov-report=xml --cov-report=html

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Check code quality
      run: |
        pip install flake8 black
        flake8 autoclicker/ autoclicker.py --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check autoclicker/ autoclicker.py

  build:
    runs-on: windows-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: pip

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Generate icon
      run: python create_icon.py

    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --icon=autoclicker.ico --add-data "autoclicker.ico;." --name "WindowsAutoclicker" autoclicker.py

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WindowsAutoclicker-${{ github.run_number }}
        path: dist/

  release:
    runs-on: windows-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version
      id: version
      shell: bash
      run: |
        VERSION=$(python -c "from autoclicker import __version__; print(__version__)")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: WindowsAutoclicker-${{ github.run_number }}
        path: dist/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
        name: Release v${{ steps.version.outputs.version }}-${{ github.run_number }}
        body: |
          ## Changes
          - Automated build from commit ${{ github.sha }}
          - All tests passed
          - Built on Windows with Python 3.11

          ## Downloads
          - Windows executable available in assets
        draft: false
        prerelease: false
        files: dist/WindowsAutoclicker.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
